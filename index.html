<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#143642">
  <title>SABATORA 物販レジ</title>
  <style>
    :root {
      --bg: #f6f4ee;
      --surface: #ffffff;
      --ink: #151922;
      --muted: #667085;
      --line: #d8d4ca;
      --navy: #143642;
      --blue: #28536b;
      --gold: #f2b705;
      --green: #1f8a5b;
      --red: #c73e3a;
      --orange: #e86f35;
      --purple: #514b83;
      --shadow: 0 12px 30px rgba(21, 25, 34, 0.12);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Hiragino Sans",
        "Yu Gothic", "YuGothic", "Noto Sans JP", sans-serif;
      -webkit-text-size-adjust: 100%;
    }

    body {
      min-height: 100%;
      margin: 0;
      background:
        linear-gradient(180deg, rgba(20, 54, 66, 0.08), transparent 210px),
        var(--bg);
    }

    button,
    input {
      font: inherit;
    }

    button {
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      width: min(1120px, 100%);
      margin: 0 auto;
      padding: 12px;
      padding-bottom: calc(28px + env(safe-area-inset-bottom));
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      margin: -12px -12px 12px;
      padding: calc(10px + env(safe-area-inset-top)) 12px 12px;
      background: rgba(246, 244, 238, 0.96);
      border-bottom: 1px solid rgba(216, 212, 202, 0.9);
      backdrop-filter: blur(18px);
    }

    .brand-row,
    .total-row,
    .stat-grid,
    .button-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .brand-row {
      justify-content: space-between;
      margin-bottom: 10px;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      font-size: clamp(18px, 5vw, 28px);
      letter-spacing: 0;
      line-height: 1.15;
    }

    .date-pill {
      flex: none;
      padding: 7px 10px;
      color: #fff;
      background: var(--navy);
      border-radius: 999px;
      font-size: 13px;
      font-weight: 800;
      line-height: 1;
      white-space: nowrap;
    }

    .total-card {
      display: grid;
      gap: 8px;
      padding: 12px;
      color: #fff;
      background: var(--navy);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .total-row {
      justify-content: space-between;
      align-items: end;
    }

    .total-label {
      color: rgba(255, 255, 255, 0.78);
      font-size: 14px;
      font-weight: 800;
    }

    .cart-count {
      padding: 6px 9px;
      color: var(--ink);
      background: var(--gold);
      border-radius: 999px;
      font-size: 13px;
      font-weight: 900;
      white-space: nowrap;
    }

    .total-amount {
      font-size: clamp(44px, 15vw, 82px);
      font-weight: 950;
      line-height: 0.95;
      letter-spacing: 0;
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .layout {
      display: grid;
      gap: 12px;
    }

    .products {
      display: grid;
      gap: 12px;
    }

    .section-panel,
    .cart-panel,
    .history-panel {
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 8px 22px rgba(21, 25, 34, 0.08);
    }

    .section-panel {
      padding: 12px;
    }

    .section-heading,
    .panel-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    h2,
    h3 {
      font-size: 17px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .category-count {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .product-button {
      min-height: 82px;
      padding: 10px;
      color: var(--ink);
      background: var(--surface);
      border: 2px solid var(--line);
      border-left-width: 7px;
      border-radius: var(--radius);
      text-align: left;
      box-shadow: 0 4px 12px rgba(21, 25, 34, 0.08);
    }

    .product-button:active {
      transform: translateY(1px);
      filter: brightness(0.98);
    }

    .product-button[data-category="Tシャツ"] {
      border-left-color: var(--blue);
    }

    .product-button[data-category="キャップ"] {
      border-left-color: var(--orange);
    }

    .product-button[data-category="小物"] {
      border-left-color: var(--green);
    }

    .product-button[data-category="ペンダント"] {
      border-left-color: var(--purple);
    }

    .product-button[data-category="アート"] {
      border-left-color: var(--red);
    }

    .product-button.high-value {
      background: #fff7e5;
      border-color: #d49b00;
      border-left-color: var(--red);
    }

    .product-name {
      display: block;
      margin-bottom: 8px;
      font-size: clamp(14px, 3.6vw, 17px);
      font-weight: 850;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .price {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 5px 8px;
      color: #fff;
      background: var(--ink);
      border-radius: 999px;
      font-size: 14px;
      font-weight: 900;
      line-height: 1;
      white-space: nowrap;
    }

    .side-stack {
      display: grid;
      gap: 12px;
    }

    .cart-panel,
    .history-panel {
      padding: 12px;
    }

    .cart-list {
      display: grid;
      gap: 8px;
    }

    .cart-item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      padding: 10px;
      background: #f9fafb;
      border: 1px solid var(--line);
      border-radius: var(--radius);
    }

    .cart-title {
      margin-bottom: 5px;
      font-size: 15px;
      font-weight: 850;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .cart-meta {
      color: var(--muted);
      font-size: 13px;
      font-weight: 750;
      line-height: 1.25;
    }

    .qty-tools {
      display: grid;
      grid-template-columns: 46px 46px;
      gap: 6px;
      align-content: start;
    }

    .icon-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 46px;
      min-height: 46px;
      color: var(--ink);
      background: #fff;
      border: 2px solid var(--line);
      border-radius: var(--radius);
      font-size: 23px;
      font-weight: 950;
      line-height: 1;
    }

    .icon-button:active,
    .action-button:active,
    .checkout-button:active {
      transform: translateY(1px);
    }

    .empty {
      padding: 14px 10px;
      color: var(--muted);
      background: #f9fafb;
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      font-weight: 750;
      text-align: center;
    }

    .action-button,
    .checkout-button {
      min-height: 52px;
      padding: 12px;
      border: 0;
      border-radius: var(--radius);
      font-weight: 900;
      line-height: 1.1;
    }

    .action-button {
      color: var(--ink);
      background: #fff;
      border: 2px solid var(--line);
    }

    .action-button:disabled {
      color: #98a2b3;
      background: #f2f4f7;
      border-color: #e4e7ec;
    }

    .action-button.warn {
      color: #fff;
      background: var(--red);
      border-color: var(--red);
    }

    .action-button.export {
      color: #fff;
      background: var(--blue);
      border-color: var(--blue);
    }

    .checkout-button {
      width: 100%;
      margin-top: 10px;
      color: #fff;
      background: var(--green);
      font-size: 20px;
      box-shadow: 0 8px 18px rgba(31, 138, 91, 0.24);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 10px;
    }

    .stat {
      min-width: 0;
      padding: 10px 8px;
      background: #f4f7f7;
      border: 1px solid var(--line);
      border-radius: var(--radius);
    }

    .stat-label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      line-height: 1.1;
    }

    .stat-value {
      display: block;
      margin-top: 5px;
      font-size: clamp(18px, 5vw, 26px);
      font-weight: 950;
      line-height: 1;
      white-space: nowrap;
    }

    .history-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 10px;
    }

    .history-scroll {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
    }

    table {
      width: 100%;
      min-width: 620px;
      border-collapse: collapse;
      font-size: 13px;
    }

    th,
    td {
      padding: 9px 8px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }

    th {
      color: #fff;
      background: var(--navy);
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    td.num,
    th.num {
      text-align: right;
      white-space: nowrap;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .toast {
      position: fixed;
      right: 12px;
      bottom: calc(12px + env(safe-area-inset-bottom));
      z-index: 30;
      max-width: min(360px, calc(100vw - 24px));
      padding: 12px 14px;
      color: #fff;
      background: rgba(21, 25, 34, 0.94);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      font-weight: 850;
      line-height: 1.35;
      opacity: 0;
      pointer-events: none;
      transform: translateY(8px);
      transition: opacity 0.18s ease, transform 0.18s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (min-width: 760px) {
      .app {
        padding: 16px;
      }

      .topbar {
        margin: -16px -16px 16px;
        padding-right: 16px;
        padding-left: 16px;
      }

      .layout {
        grid-template-columns: minmax(0, 1.2fr) minmax(330px, 0.8fr);
        align-items: start;
      }

      .side-stack {
        position: sticky;
        top: 154px;
      }

      .product-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 420px) {
      .product-grid {
        grid-template-columns: 1fr;
      }

      .stats {
        grid-template-columns: 1fr;
      }

      .history-actions {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand-row">
        <h1>SABATORA 物販レジ</h1>
        <span class="date-pill" id="todayLabel"></span>
      </div>

      <section class="total-card" aria-label="現在の合計">
        <div class="total-row">
          <span class="total-label">合計</span>
          <span class="cart-count" id="cartCount">0点</span>
        </div>
        <div class="total-amount" id="cartTotal">¥0</div>
        <div class="button-row">
          <button class="action-button" id="undoButton" type="button" disabled>取り消す</button>
          <button class="action-button warn" id="clearCartButton" type="button">全クリア</button>
        </div>
      </section>
    </header>

    <main class="layout">
      <section class="products" id="productSections" aria-label="商品一覧"></section>

      <aside class="side-stack">
        <section class="cart-panel" aria-label="カート">
          <div class="panel-heading">
            <h2>カート</h2>
          </div>
          <div class="cart-list" id="cartList"></div>
          <button class="checkout-button" id="checkoutButton" type="button">会計確定</button>
        </section>

        <section class="history-panel" aria-label="本日の販売履歴">
          <div class="panel-heading">
            <h2>本日の販売</h2>
          </div>
          <div class="stats">
            <div class="stat">
              <span class="stat-label">売上合計</span>
              <span class="stat-value" id="salesTotal">¥0</span>
            </div>
            <div class="stat">
              <span class="stat-label">販売件数</span>
              <span class="stat-value" id="salesCount">0</span>
            </div>
            <div class="stat">
              <span class="stat-label">販売点数</span>
              <span class="stat-value" id="salesItems">0</span>
            </div>
          </div>
          <div class="history-actions">
            <button class="action-button export" id="exportButton" type="button">CSV出力</button>
            <button class="action-button warn" id="resetHistoryButton" type="button">履歴リセット</button>
          </div>
          <div class="history-scroll" id="historyWrap"></div>
        </section>
      </aside>
    </main>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const products = [
      { id: "shirt-black-s", category: "Tシャツ", name: "SABATORA LOGO T-shirt (black) S", price: 3500 },
      { id: "shirt-black-m", category: "Tシャツ", name: "SABATORA LOGO T-shirt (black) M", price: 3500 },
      { id: "shirt-white-s", category: "Tシャツ", name: "SABATORA LOGO T-shirt (white) S", price: 3500 },
      { id: "shirt-white-m", category: "Tシャツ", name: "SABATORA LOGO T-shirt (white) M", price: 3500 },
      { id: "cap-white", category: "キャップ", name: "SABATORA SHOKAI CURVE CAP (white)", price: 3000 },
      { id: "cap-black", category: "キャップ", name: "SABA&TORA CURVE CAP (black)", price: 4300 },
      { id: "carabiner", category: "小物", name: "SABATORA LOGO カラビナ", price: 700 },
      { id: "keyholder", category: "小物", name: "SABATORA LOGO キーホルダー", price: 700 },
      { id: "sticker", category: "小物", name: "Initiation Sticker (2-stick pack)", price: 500 },
      { id: "acrylic-stand", category: "小物", name: "忘却事象博覧会 (Hagiwara) 限定アクスタ", price: 850 },
      { id: "pendant-strawberry", category: "ペンダント", name: "Cardioid Pendant Strawberry", price: 3800 },
      { id: "pendant-creamsoda", category: "ペンダント", name: "Cardioid Pendant CreamSoda", price: 4000 },
      { id: "pendant-ramunesoda", category: "ペンダント", name: "Cardioid Pendant RamuneSoda", price: 4000 },
      { id: "pendant-chocolate", category: "ペンダント", name: "Cardioid Pendant Chocolate", price: 4000 },
      { id: "bluecat", category: "アート", name: "The BlueCat / A blue cat with button eyes", price: 3000 },
      { id: "original-painting", category: "アート", name: "Original Painting / The Scapegoat (2024)", price: 150000, highValue: true }
    ];

    const categoryOrder = ["Tシャツ", "キャップ", "小物", "ペンダント", "アート"];
    const productById = new Map(products.map((product) => [product.id, product]));
    const yen = new Intl.NumberFormat("ja-JP", {
      style: "currency",
      currency: "JPY",
      maximumFractionDigits: 0
    });

    const state = {
      todayKey: getTodayKey(),
      cart: {},
      sales: [],
      undoStack: []
    };

    const els = {
      todayLabel: document.getElementById("todayLabel"),
      productSections: document.getElementById("productSections"),
      cartList: document.getElementById("cartList"),
      cartCount: document.getElementById("cartCount"),
      cartTotal: document.getElementById("cartTotal"),
      undoButton: document.getElementById("undoButton"),
      clearCartButton: document.getElementById("clearCartButton"),
      checkoutButton: document.getElementById("checkoutButton"),
      salesTotal: document.getElementById("salesTotal"),
      salesCount: document.getElementById("salesCount"),
      salesItems: document.getElementById("salesItems"),
      exportButton: document.getElementById("exportButton"),
      resetHistoryButton: document.getElementById("resetHistoryButton"),
      historyWrap: document.getElementById("historyWrap"),
      toast: document.getElementById("toast")
    };

    let toastTimer = 0;

    init();

    function init() {
      state.sales = loadSales();
      renderProducts();
      render();
      bindEvents();
    }

    function bindEvents() {
      els.productSections.addEventListener("click", (event) => {
        const button = event.target.closest("[data-product-id]");
        if (!button) return;
        addProduct(button.dataset.productId);
      });

      els.cartList.addEventListener("click", (event) => {
        const button = event.target.closest("[data-cart-action]");
        if (!button) return;
        changeCartQty(button.dataset.productId, button.dataset.cartAction);
      });

      els.undoButton.addEventListener("click", undo);
      els.clearCartButton.addEventListener("click", clearCart);
      els.checkoutButton.addEventListener("click", checkout);
      els.exportButton.addEventListener("click", exportCsv);
      els.resetHistoryButton.addEventListener("click", resetHistory);

      document.addEventListener("visibilitychange", () => {
        if (!document.hidden) ensureToday();
      });
    }

    function getTodayKey(date = new Date()) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function getSalesKey() {
      return `sabatora-pos-sales-${state.todayKey}`;
    }

    function ensureToday() {
      const currentKey = getTodayKey();
      if (currentKey === state.todayKey) return;
      state.todayKey = currentKey;
      state.cart = {};
      state.sales = loadSales();
      state.undoStack = [];
      render();
    }

    function loadSales() {
      try {
        const raw = localStorage.getItem(getSalesKey());
        return raw ? JSON.parse(raw) : [];
      } catch (error) {
        showToast("販売履歴を読み込めませんでした");
        return [];
      }
    }

    function saveSales() {
      try {
        localStorage.setItem(getSalesKey(), JSON.stringify(state.sales));
      } catch (error) {
        alert("販売履歴の保存に失敗しました。ブラウザの保存容量を確認してください。");
      }
    }

    function renderProducts() {
      els.productSections.innerHTML = categoryOrder.map((category) => {
        const items = products.filter((product) => product.category === category);
        const buttons = items.map((product) => `
          <button
            class="product-button${product.highValue ? " high-value" : ""}"
            type="button"
            data-product-id="${escapeHtml(product.id)}"
            data-category="${escapeHtml(product.category)}"
          >
            <span class="product-name">${escapeHtml(product.name)}</span>
            <span class="price">${yen.format(product.price)}</span>
          </button>
        `).join("");

        return `
          <section class="section-panel" aria-label="${escapeHtml(category)}">
            <div class="section-heading">
              <h2>${escapeHtml(category)}</h2>
              <span class="category-count">${items.length}商品</span>
            </div>
            <div class="product-grid">${buttons}</div>
          </section>
        `;
      }).join("");
    }

    function render() {
      ensureTodayLabel();
      renderCart();
      renderSales();
      els.undoButton.disabled = state.undoStack.length === 0;
    }

    function ensureTodayLabel() {
      const [year, month, day] = state.todayKey.split("-");
      els.todayLabel.textContent = `${Number(month)}/${Number(day)}`;
      document.title = `SABATORA 物販レジ ${year}-${month}-${day}`;
    }

    function getCartEntries() {
      return Object.entries(state.cart)
        .map(([id, qty]) => {
          const product = productById.get(id);
          if (!product || qty <= 0) return null;
          return {
            id,
            name: product.name,
            price: product.price,
            qty,
            subtotal: product.price * qty
          };
        })
        .filter(Boolean);
    }

    function renderCart() {
      const entries = getCartEntries();
      const itemCount = entries.reduce((sum, item) => sum + item.qty, 0);
      const total = entries.reduce((sum, item) => sum + item.subtotal, 0);

      els.cartCount.textContent = `${itemCount}点`;
      els.cartTotal.textContent = yen.format(total);

      if (entries.length === 0) {
        els.cartList.innerHTML = '<p class="empty">カートは空です</p>';
        return;
      }

      els.cartList.innerHTML = entries.map((item) => `
        <div class="cart-item">
          <div>
            <div class="cart-title">${escapeHtml(item.name)}</div>
            <div class="cart-meta">
              ${yen.format(item.price)} × ${item.qty} = ${yen.format(item.subtotal)}
            </div>
          </div>
          <div class="qty-tools">
            <button class="icon-button" type="button" data-cart-action="minus" data-product-id="${escapeHtml(item.id)}" aria-label="${escapeHtml(item.name)}を1点減らす">−</button>
            <button class="icon-button" type="button" data-cart-action="plus" data-product-id="${escapeHtml(item.id)}" aria-label="${escapeHtml(item.name)}を1点増やす">+</button>
          </div>
        </div>
      `).join("");
    }

    function renderSales() {
      const total = state.sales.reduce((sum, sale) => sum + sale.total, 0);
      const itemCount = state.sales.reduce((sum, sale) => {
        return sum + sale.items.reduce((itemSum, item) => itemSum + item.qty, 0);
      }, 0);

      els.salesTotal.textContent = yen.format(total);
      els.salesCount.textContent = String(state.sales.length);
      els.salesItems.textContent = String(itemCount);

      if (state.sales.length === 0) {
        els.historyWrap.innerHTML = '<p class="empty">履歴はまだありません</p>';
        return;
      }

      const rows = state.sales.slice().reverse().map((sale) => {
        const items = sale.items.map((item) => `${escapeHtml(item.name)} × ${item.qty}`).join("<br>");
        return `
          <tr>
            <td>${escapeHtml(formatTime(sale.timestamp))}</td>
            <td>${escapeHtml(sale.id)}</td>
            <td>${items}</td>
            <td class="num">${sale.items.reduce((sum, item) => sum + item.qty, 0)}</td>
            <td class="num">${yen.format(sale.total)}</td>
          </tr>
        `;
      }).join("");

      els.historyWrap.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>時刻</th>
              <th>取引番号</th>
              <th>商品</th>
              <th class="num">点数</th>
              <th class="num">合計</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    function pushUndo(label) {
      state.undoStack.push({
        label,
        cart: { ...state.cart },
        sales: JSON.parse(JSON.stringify(state.sales))
      });
      if (state.undoStack.length > 30) state.undoStack.shift();
    }

    function undo() {
      const last = state.undoStack.pop();
      if (!last) return;
      state.cart = { ...last.cart };
      state.sales = JSON.parse(JSON.stringify(last.sales));
      saveSales();
      render();
      showToast("直前操作を取り消しました");
    }

    function addProduct(productId) {
      ensureToday();
      const product = productById.get(productId);
      if (!product) return;

      if (product.highValue) {
        const ok = confirm(`${product.name}\n${yen.format(product.price)}\n\n高額商品をカートに追加しますか？`);
        if (!ok) return;
      }

      pushUndo("add");
      state.cart[productId] = (state.cart[productId] || 0) + 1;
      render();
      showToast(`${product.name} を追加しました`);
    }

    function changeCartQty(productId, action) {
      ensureToday();
      if (!state.cart[productId]) return;
      const product = productById.get(productId);

      pushUndo(action);
      if (action === "plus") {
        state.cart[productId] += 1;
      } else {
        state.cart[productId] -= 1;
        if (state.cart[productId] <= 0) delete state.cart[productId];
      }

      render();
      if (product) showToast(`${product.name} の数量を変更しました`);
    }

    function clearCart() {
      ensureToday();
      if (getCartEntries().length === 0) return;
      pushUndo("clear");
      state.cart = {};
      render();
      showToast("カートをクリアしました");
    }

    function checkout() {
      ensureToday();
      const entries = getCartEntries();
      if (entries.length === 0) {
        alert("カートが空です。");
        return;
      }

      const now = new Date();
      const total = entries.reduce((sum, item) => sum + item.subtotal, 0);
      const sale = {
        id: getNextTransactionId(),
        timestamp: now.toISOString(),
        items: entries,
        total
      };

      pushUndo("checkout");
      state.sales.push(sale);
      state.cart = {};
      saveSales();
      render();
      showToast(`${sale.id} / ${yen.format(total)} を記録しました`);
    }

    function getNextTransactionId() {
      const number = String(state.sales.length + 1).padStart(3, "0");
      return `${state.todayKey.replaceAll("-", "")}-${number}`;
    }

    function resetHistory() {
      ensureToday();
      if (state.sales.length === 0) {
        alert("本日の販売履歴は空です。");
        return;
      }

      const ok = confirm("本日の販売履歴をすべてリセットします。よろしいですか？");
      if (!ok) return;

      pushUndo("reset-history");
      state.sales = [];
      saveSales();
      render();
      showToast("本日の販売履歴をリセットしました");
    }

    function exportCsv() {
      ensureToday();
      if (state.sales.length === 0) {
        alert("出力する販売履歴がありません。");
        return;
      }

      const rows = [["日時", "取引番号", "商品名", "単価", "数量", "小計", "取引合計"]];
      state.sales.forEach((sale) => {
        sale.items.forEach((item) => {
          rows.push([
            formatDateTime(sale.timestamp),
            sale.id,
            item.name,
            item.price,
            item.qty,
            item.subtotal,
            sale.total
          ]);
        });
      });

      const csv = "\uFEFF" + rows.map((row) => row.map(csvCell).join(",")).join("\r\n");
      const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `sabatora-sales-${state.todayKey}.csv`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      window.setTimeout(() => URL.revokeObjectURL(url), 1000);
      showToast("CSVを出力しました");
    }

    function csvCell(value) {
      const text = String(value ?? "");
      return `"${text.replaceAll('"', '""')}"`;
    }

    function formatDateTime(isoString) {
      const date = new Date(isoString);
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      const hh = String(date.getHours()).padStart(2, "0");
      const mm = String(date.getMinutes()).padStart(2, "0");
      const ss = String(date.getSeconds()).padStart(2, "0");
      return `${y}-${m}-${d} ${hh}:${mm}:${ss}`;
    }

    function formatTime(isoString) {
      const date = new Date(isoString);
      const hh = String(date.getHours()).padStart(2, "0");
      const mm = String(date.getMinutes()).padStart(2, "0");
      const ss = String(date.getSeconds()).padStart(2, "0");
      return `${hh}:${mm}:${ss}`;
    }

    function showToast(message) {
      window.clearTimeout(toastTimer);
      els.toast.textContent = message;
      els.toast.classList.add("show");
      toastTimer = window.setTimeout(() => {
        els.toast.classList.remove("show");
      }, 1800);
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
